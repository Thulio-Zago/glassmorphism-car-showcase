<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiência de Cor Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #280137;
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: rgba(0, 0, 0, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-color) 0%, rgba(0, 0, 0, 0.6) 100%);
            background-color: var(--primary-color);
            /* fallback */
            color: var(--text-color);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 1s cubic-bezier(0.25, 1, 0.5, 1), color 0.5s ease;
        }

        /* Ambient glowing orb */
        .orb {
            position: absolute;
            width: 60vw;
            height: 60vw;
            border-radius: 50%;
            background: radial-gradient(circle, var(--primary-color) 0%, transparent 70%);
            filter: blur(80px);
            opacity: 0.6;
            z-index: 0;
            animation: floatOrb 15s ease-in-out infinite alternate;
            transition: background 1s ease;
            pointer-events: none;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(-10%, -10%) scale(1);
            }

            50% {
                transform: translate(10%, 10%) scale(1.1);
            }

            100% {
                transform: translate(-5%, 15%) scale(0.9);
            }
        }

        .main-content {
            z-index: 2;
            text-align: center;
            pointer-events: none;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 1rem;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: color 0.5s ease;
        }

        p.subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            opacity: 0.8;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .toggle-btn {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 32px var(--glass-shadow);
            color: var(--text-color);
        }

        .toggle-btn:hover {
            transform: scale(1.1) rotate(15deg);
            background: rgba(255, 255, 255, 0.2);
        }

        .toggle-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            transition: fill 0.5s ease;
        }

        .container {
            position: absolute;
            top: 6rem;
            right: 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 16px 40px var(--glass-shadow), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            width: 280px;
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-20px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .container.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .container h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-color);
            transition: color 0.5s ease;
        }

        .color-picker-wrapper {
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            position: relative;
        }

        /* Custom Color Picker Styling */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
            background: transparent;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.1);
        }

        input[type="color"]:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
        }

        .hex-display {
            font-family: 'Outfit', monospace;
            font-size: 1.1rem;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            user-select: all;
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: color 0.5s ease;
        }

        .presets {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            justify-items: center;
        }

        .preset-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .preset-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.3), inset 0 -2px 4px rgba(0, 0, 0, 0.2);
        }

        .preset-btn:hover {
            transform: scale(1.2) translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            z-index: 2;
        }

        .car-selector-wrapper {
            margin-bottom: 1.5rem;
            width: 100%;
        }

        .custom-select {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
            appearance: none;
            text-align: center;
        }

        .custom-select:hover,
        .custom-select:focus {
            background: rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .custom-select option {
            background: #280137;
            color: #ffffff;
        }

        .mustang-silhouette {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            max-width: 800px;
            object-fit: contain;
            mix-blend-mode: overlay;
            opacity: 0.15;
            transition: opacity 0.5s ease;
            pointer-events: none;
            z-index: 1;
        }

        /* Light mode overrides dynamically applied via JS */
        body.light-mode {
            --glass-bg: rgba(0, 0, 0, 0.05);
            --glass-border: rgba(0, 0, 0, 0.1);
            --glass-shadow: rgba(0, 0, 0, 0.1);
        }

        body.light-mode input[type="color"]::-webkit-color-swatch {
            border-color: rgba(0, 0, 0, 0.2);
        }

        body.light-mode .preset-btn {
            border-color: rgba(0, 0, 0, 0.2);
        }

        body.light-mode .custom-select {
            background: rgba(255, 255, 255, 0.5);
            border-color: rgba(0, 0, 0, 0.2);
        }

        body.light-mode .custom-select:hover {
            background: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>

<body>

    <div class="orb"></div>

    <button class="toggle-btn" id="toggleBtn" title="Menu de Cores">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.38 0 2.5-1.12 2.5-2.5 0-.61-.23-1.21-.64-1.67-.08-.09-.13-.21-.13-.33 0-.28.22-.5.5-.5H16c3.31 0 6-2.69 6-6 0-4.96-4.49-9-10-9zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 8 6.5 8 8 8.67 8 9.5 7.33 11 6.5 11zm3-4c-.83 0-1.5-.67-1.5-1.5S8.67 4 9.5 4 11 4.67 11 5.5 10.33 7 9.5 7zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 4 14.5 4 16 4.67 16 5.5 15.33 7 14.5 7zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 8 17.5 8 19 8.67 19 9.5 18.33 11 17.5 11z" />
        </svg>
    </button>

    <div class="container" id="colorPopup">
        <h2>Personalizar</h2>

        <div class="car-selector-wrapper">
            <select id="carSelector" class="custom-select" title="Selecione o Veículo">
                <option value="mustang.png">Mustang</option>
                <option value="porsche.png">Porsche 911</option>
                <option value="ferrari.png">Ferrari F40</option>
                <option value="camaro.png">Camaro</option>
                <option value="lamborghini.png">Lamborghini SVJ</option>
                <option value="">Nenhum (Ocultar)</option>
            </select>
        </div>

        <div class="color-picker-wrapper">
            <input type="color" id="colorPicker" value="#280137" title="Seletor Customizado">
            <div class="hex-display" id="hexDisplay">#280137</div>
        </div>

        <div class="presets">
            <button class="preset-btn" style="background-color: #ef476f;" data-color="#ef476f"
                title="Rosa Vivo"></button>
            <button class="preset-btn" style="background-color: #ffd166;" data-color="#ffd166"
                title="Amarelo Sol"></button>
            <button class="preset-btn" style="background-color: #06d6a0;" data-color="#06d6a0"
                title="Verde Esmeralda"></button>
            <button class="preset-btn" style="background-color: #118ab2;" data-color="#118ab2"
                title="Azul Oceano"></button>
            <button class="preset-btn" style="background-color: #073b4c;" data-color="#073b4c"
                title="Azul Profundo"></button>
            <button class="preset-btn" style="background-color: #280137;" data-color="#280137"
                title="Roxo Noturno"></button>
        </div>
    </div>

    <img src="mustang.png" id="carImage" alt="" class="mustang-silhouette" onerror="this.style.display='none'">

    <script>
        const root = document.documentElement;
        const colorPicker = document.getElementById('colorPicker');
        const hexDisplay = document.getElementById('hexDisplay');
        const presetBtns = document.querySelectorAll('.preset-btn');
        const toggleBtn = document.getElementById('toggleBtn');
        const colorPopup = document.getElementById('colorPopup');
        const body = document.body;
        const carSelector = document.getElementById('carSelector');
        const carImage = document.getElementById('carImage');

        // Toggle popup
        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            colorPopup.classList.toggle('show');
        });

        // Close popup when clicking outside
        document.addEventListener('click', (e) => {
            if (!colorPopup.contains(e.target) && !toggleBtn.contains(e.target)) {
                colorPopup.classList.remove('show');
            }
        });

        // Helper to calculate relative luminance
        function getLuminance(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;

            let a = [r, g, b].map(function (v) {
                return v <= 0.03928
                    ? v / 12.92
                    : Math.pow((v + 0.055) / 1.055, 2.4);
            });
            return a[0] * 0.2126 + a[1] * 0.7152 + a[2] * 0.0722;
        }

        function updateThemeBasedOnLuminance(color) {
            const luminance = getLuminance(color);
            // If background is light, use dark text and styles
            if (luminance > 0.5) {
                root.style.setProperty('--text-color', '#1a1a1a');
                body.classList.add('light-mode');
            } else {
                root.style.setProperty('--text-color', '#ffffff');
                body.classList.remove('light-mode');
            }
        }

        function updateColor(color) {
            root.style.setProperty('--primary-color', color);
            hexDisplay.textContent = color.toUpperCase();
            colorPicker.value = color;
            updateThemeBasedOnLuminance(color);
        }

        colorPicker.addEventListener('input', (e) => {
            updateColor(e.target.value);
        });

        presetBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const color = btn.getAttribute('data-color');
                updateColor(color);
            });
        });

        carSelector.addEventListener('change', (e) => {
            const selectedCar = e.target.value;
            if (selectedCar === "") {
                carImage.style.display = 'none';
            } else {
                carImage.style.display = 'block';
                carImage.src = selectedCar;
            }
        });

        // Initialize theme
        updateThemeBasedOnLuminance(colorPicker.value);
    </script>
</body>

</html>
